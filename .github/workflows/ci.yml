name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-progress runs for the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-quality:
    name: Backend quality (ruff + mypy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-py
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: false  # cache stale tra ruff>=0.4 vecchio e nuovo pin >=0.14
          # TODO: ri-abilitare con cache-dependency-glob una volta committato uv.lock

      - name: Install dependencies
        # No uv.lock present; resolving from pyproject.toml is acceptable for MVP.
        run: uv sync --extra dev

      - name: Ruff
        run: uv run ruff check .

      # Mypy strict mode is aspirational on this MVP: 100+ legacy
      # violations remain to be cleaned. Run + report, do not gate.
      - name: Mypy
        run: uv run mypy app
        continue-on-error: true

  backend-tests:
    name: Backend tests (unit + contract)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-py
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: false  # cache stale tra ruff>=0.4 vecchio e nuovo pin >=0.14
          # TODO: ri-abilitare con cache-dependency-glob una volta committato uv.lock

      - name: Install dependencies
        run: uv sync --extra dev

      # Integration tests require testcontainers (Docker daemon) and security
      # tests need asyncio loop tweaks; both are out of scope for the default
      # CI run and should be triggered manually or in a dedicated workflow.
      - name: Pytest (unit + contract)
        run: uv run pytest tests/unit tests/contract -v

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Lint is non-blocking on this portfolio MVP: a stale eslint config or
      # a new rule should not gate merges while the build itself is green.
      - name: Lint
        run: npm run lint
        continue-on-error: true
